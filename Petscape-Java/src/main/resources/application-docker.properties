# =============================================================
# PetsCape API - Docker Profile Configuration
# Activated when SPRING_PROFILES_ACTIVE=docker
# All secrets read from environment variables set in docker-compose.yml
# =============================================================

# ---- PostgreSQL (uses Docker service name 'db' as host) ----
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:petscape}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Server ----
server.port=8080

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}

# ---- File Upload ----
app.upload.dir=/app/uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- Stripe ----
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.success-url=${STRIPE_SUCCESS_URL}
stripe.cancel-url=${STRIPE_CANCEL_URL}

# ---- Mail (SMTP) ----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- App Base URL ----
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ---- Swagger ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ---- Logging (quieter in production-like environments) ----
logging.level.com.petscape=INFO
logging.level.org.springframework.security=WARN
