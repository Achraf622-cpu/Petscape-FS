# =============================================================
# PetsCape API - Application Configuration
# =============================================================

spring.application.name=petscape-api

# ---- PostgreSQL DataSource ----
spring.datasource.url=jdbc:postgresql://localhost:5432/petscape
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Server ----
server.port=8080

# ---- JWT ----
app.jwt.secret=PetsCapeSecretKey2024SuperSecureRandomStringAtLeast32Chars!
app.jwt.expiration-ms=900000
app.refresh-token.expiration-days=7

# ---- File Upload ----
app.upload.dir=uploads/
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB

# ---- Stripe ----
stripe.secret-key=sk_test_yourStripeSecretKeyHere
stripe.success-url=http://localhost:4200/donate/success
stripe.cancel-url=http://localhost:4200/donate/cancel

# ---- Mail (SMTP) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- App Base URL (for email links) ----
app.base-url=http://localhost:8080

# ---- CORS (Angular dev server) ----
app.cors.allowed-origins=http://localhost:4200

# ---- Swagger / OpenAPI ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ---- Logging ----
logging.level.com.petscape=DEBUG
logging.level.org.springframework.security=WARN
